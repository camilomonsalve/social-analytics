spring:
  application:
    name: social-analytics

  datasource:
    url: jdbc:postgresql://localhost:5432/social_analytics
    username: social_analytics
    password: social_analytics
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
