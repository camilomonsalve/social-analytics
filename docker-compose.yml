version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: social-analytics-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: social_analytics
      POSTGRES_USER: social_analytics
      POSTGRES_PASSWORD: social_analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: social-analytics-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@socialanalytics.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
